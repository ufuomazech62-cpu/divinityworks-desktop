name: Build Divinity Works Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/x
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-windows
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/x
    env:
      ROWBOAT_SKIP_CODE_SIGNING: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-macos
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/x
    env:
      ROWBOAT_SKIP_PACMAN: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-linux
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.run_id }}
          path: artifacts
      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="v0.1.0"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || 'v0.1.0' }}
          name: Divinity Desktop v0.1.0
          files: artifacts/**/*
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
