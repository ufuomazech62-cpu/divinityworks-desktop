name: Build Divinity Works Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/x
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-windows
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/x
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-macos
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/x
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (shared, core, preload)
        run: pnpm run deps
      - name: Package desktop app
        run: pnpm --filter divinity make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divinity-desktop-linux
          path: apps/x/out/make/**/*
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
