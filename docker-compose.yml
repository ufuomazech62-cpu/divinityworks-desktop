# Divinity Works backend stack
# Runs on the Oracle VM (free tier, us-phoenix-1).
# Ingress is ONLY via Cloudflare Tunnel — no ports published to the public internet.
# Secrets come from the .env file (gitignored) or CI secrets. Never commit real values.

services:
  divinityworks:
    build:
      context: ./apps/rowboat
      dockerfile: Dockerfile
    # intentionally NOT published: only cloudflared reaches this
    environment:
      - NODE_ENV=production
      - PORT=3000
      # LLM: OpenRouter (OpenAI-compatible). The app reads PROVIDER_*
      - OPENAI_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_BASE_URL=https://openrouter.ai/api/v1
      - PROVIDER_DEFAULT_MODEL=tencent/hy3:free
      - PROVIDER_COPILOT_MODEL=tencent/hy3:free
      # Database
      - MONGODB_CONNECTION_STRING=mongodb://mongo:27017/divinityworks
      # Auth0 + Google social (zero code change vs Rowboat)
      - USE_AUTH=${USE_AUTH}
      - AUTH0_SECRET=${AUTH0_SECRET}
      - AUTH0_BASE_URL=${AUTH0_BASE_URL}
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      # Cache / pub-sub / quotas
      - REDIS_URL=redis://redis:6379
      # Vector store (RAG)
      - USE_RAG=${USE_RAG}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      # File storage: Cloudflare R2 (S3-compatible)
      - USE_RAG_UPLOADS=${USE_RAG_UPLOADS}
      - USE_RAG_S3_UPLOADS=${USE_RAG_UPLOADS}
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - AWS_ENDPOINT_URL=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      - RAG_UPLOADS_S3_BUCKET=${R2_BUCKET}
      - RAG_UPLOADS_S3_REGION=auto
      - RAG_UPLOADS_DIR=/app/uploads
      # Billing (Stripe — your account). Off (guest mode) until wired.
      - USE_BILLING=${USE_BILLING:-false}
      - BILLING_API_URL=${BILLING_API_URL}
      - BILLING_API_KEY=${BILLING_API_KEY}
      # Misc
      - MAX_QUERIES_PER_MINUTE=${MAX_QUERIES_PER_MINUTE:-60}
      - MAX_PROJECTS_PER_USER=${MAX_PROJECTS_PER_USER:-10}
      - USE_CHAT_WIDGET=${USE_CHAT_WIDGET:-false}
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy

  # Cloudflare Tunnel — the only public ingress
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped

  # ---- Data tier (internal only) ----
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/data/qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/data/qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 10s
      retries: 3

  # ---- Workers (same as Rowboat) ----
  setup_qdrant:
    build:
      context: ./apps/rowboat
      dockerfile: scripts.Dockerfile
    command: ["sh", "-c", "npm run setupQdrant"]
    profiles: ["setup_qdrant"]
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    restart: no

  rag-worker:
    build:
      context: ./apps/rowboat
      dockerfile: scripts.Dockerfile
    command: ["npm", "run", "rag-worker"]
    profiles: ["rag-worker"]
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - AWS_ENDPOINT_URL=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      - RAG_UPLOADS_S3_BUCKET=${R2_BUCKET}
      - RAG_UPLOADS_S3_REGION=auto
      - RAG_UPLOADS_DIR=/app/uploads
      - OPENAI_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_BASE_URL=https://openrouter.ai/api/v1
      - PROVIDER_DEFAULT_MODEL=tencent/hy3:free
      - MONGODB_CONNECTION_STRING=mongodb://mongo:27017/divinityworks
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - USE_BILLING=${USE_BILLING:-false}
      - BILLING_API_URL=${BILLING_API_URL}
      - BILLING_API_KEY=${BILLING_API_KEY}
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  jobs-worker:
    build:
      context: ./apps/rowboat
      dockerfile: scripts.Dockerfile
    command: ["npm", "run", "jobs-worker"]
    environment:
      - OPENAI_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_API_KEY=${PROVIDER_API_KEY}
      - PROVIDER_BASE_URL=https://openrouter.ai/api/v1
      - PROVIDER_DEFAULT_MODEL=tencent/hy3:free
      - PROVIDER_COPILOT_MODEL=tencent/hy3:free
      - MONGODB_CONNECTION_STRING=mongodb://mongo:27017/divinityworks
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - USE_BILLING=${USE_BILLING:-false}
      - BILLING_API_URL=${BILLING_API_URL}
      - BILLING_API_KEY=${BILLING_API_KEY}
    restart: unless-stopped

volumes:
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/uploads
