packages:
  - apps/*
  - packages/*

allowBuilds:
  baileys: true
  core-js: true
  electron: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  node-pty: true
  protobufjs: true

blockExoticSubdeps: false

overrides:
  vscode-jsonrpc: 8.2.0

# langium imports vscode-jsonrpc/lib/common/events.js but doesn't declare the
# dependency (it only gets it transitively via vscode-languageserver), which
# breaks resolution under pnpm's strict layout. Graft it on.
packageExtensions:
  langium:
    dependencies:
      vscode-jsonrpc: '*'

catalog:
  vitest: 4.1.7

onlyBuiltDependencies:
  - baileys
  - core-js
  - electron
  - electron-winstaller
  - esbuild
  - fs-xattr
  - macos-alias
  - protobufjs
