name = "divinityworks-dash"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — dash.divinityworks.space
# To enable: log into Cloudflare dashboard and add a Worker route for
# dash.divinityworks.space -> divinityworks-dash, plus an AAAA/DNS record.
# Wrangler can't do this with the current API token (no zone perms).
# For now the Worker is accessible at its workers.dev URL.
# routes = [
#   { pattern = "dash.divinityworks.space", custom_domain = true }
# ]

# D1 database — users, sessions, subscriptions
[[d1_databases]]
binding = "DB"
database_name = "divinityworks-saas"
database_id = "d48b6563-7a2a-4c55-b1b8-d27dfc21c5eb"

# KV namespace — short-lived session blacklist, rate-limit counters
[[kv_namespaces]]
binding = "KV"
id = "4301094375c044c88a9158ef2da67d32"

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET           — HS256 signing key (32+ random bytes)
#   OPENROUTER_API_KEY   — for the LLM proxy to OpenRouter (tencent/hy3:free)
#   COMPOSIO_API_KEY     — for the Composio integration proxy
#   STRIPE_SECRET_KEY    — for billing
#   STRIPE_WEBHOOK_SECRET — for Stripe webhook signature verification
#   RESEND_API_KEY       — for magic-link emails (v2)

[vars]
ENV = "production"
LLM_BASE_URL = "https://openrouter.ai/api/v1"
LLM_DEFAULT_MODEL = "tencent/hy3:free"
COMPOSIO_BASE_URL = "https://backend.composio.dev/api/v3"
